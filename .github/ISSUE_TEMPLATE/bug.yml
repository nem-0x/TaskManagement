name: バグ報告
description: 不具合・エラーの報告
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        バグの報告ありがとうございます。再現手順を詳しく記入してください。

  - type: textarea
    id: description
    attributes:
      label: バグの説明
      description: 何が起きているか簡潔に説明してください
      placeholder: 例：カードをドラッグすると画面がフリーズする
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 再現手順
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 期待する動作
      placeholder: 例：カードが別のカラムに移動する
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 実際の動作
      placeholder: 例：画面がフリーズして操作できなくなる
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: 環境
      placeholder: 例：Chrome 124 / macOS 14 / Docker Compose v2
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: エラーログ・スクリーンショット
      description: コンソールエラー、スタックトレース、スクリーンショットがあれば貼り付けてください
    validations:
      required: false
